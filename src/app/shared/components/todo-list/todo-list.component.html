<div class="card shadow">
    <div class="card-body">
              <!-- No Todos Message -->
        <div *ngIf="todoArr.length === 0" class="alert alert-info text-center">
            No Todo Items Added Yet!!!
        </div>
        <ul class="list-group">
            <li *ngFor="let todo of todoArr" class="d-flex justify-content-between list-group-item">
                <strong>{{todo.todoItem}}</strong>
                
                <div>
                    <button mat-mini-fab
                    (click)="onEdittodo(todo)"
                     color="primary" class="btn btn-sm btn-outline-primary">
                     <mat-icon>edit</mat-icon>  
                    </button>
                    <button mat-mini-fab color="warn"
                    (click)="onremovetodo(todo.id)"
                    class=" btn btn-sm btn-outline-danger">
                        <mat-icon>delete</mat-icon>  
                </button>
                </div>
            </li>
        </ul>
    </div>

</div>



    <div *ngIf="todoArr.length === 0" class="text-center py-4">
    <h4 class="text-muted">No Todo Items Added Yet</h4>
    <p>Add your first todo using the form above.</p>
